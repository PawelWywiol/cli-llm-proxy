services:
  cli-llm-proxy:
    container_name: cli-llm-proxy
    build: .
    ports:
      - "${PORT:-11434}:11434"
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - HOME=${HOST_HOME:-/home/code}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PROXY_API_KEY=${PROXY_API_KEY:-}
      - DEFAULT_ADAPTER=${DEFAULT_ADAPTER:-claude}
      - CLAUDE_ENABLED=${CLAUDE_ENABLED:-true}
      - GEMINI_ENABLED=${GEMINI_ENABLED:-false}
      - COPILOT_ENABLED=${COPILOT_ENABLED:-false}
      - CLAUDE_CLI_PATH=${HOST_HOME:-/home/code}/.local/bin/claude
    volumes:
      # Host-installed CLI binary + auth, mounted at identical paths so the
      # CLI's absolute symlinks resolve inside the container. Host updates flow
      # through automatically (directories mounted, not pinned version files).
      - ${HOST_HOME:-/home/code}/.local/bin:${HOST_HOME:-/home/code}/.local/bin:ro
      - ${HOST_HOME:-/home/code}/.local/share/claude:${HOST_HOME:-/home/code}/.local/share/claude:ro
      - ${HOST_HOME:-/home/code}/.claude:${HOST_HOME:-/home/code}/.claude
      - ${HOST_HOME:-/home/code}/.claude.json:${HOST_HOME:-/home/code}/.claude.json
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:11434/health').then(r=>{if(!r.ok)throw 1})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
